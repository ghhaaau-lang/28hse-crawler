name: 28hse WhatsApp Crawler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pywhatkit
          playwright install chromium

      - name: Run crawler with WhatsApp
        env:
          YOUR_WHATSAPP: "+85255890940"   # ← 請改成你的 WhatsApp 號碼
        run: python app.py
