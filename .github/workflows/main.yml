name: Rent Discord Crawlers

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rent-crawlers
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run combined crawlers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python app.py

      - name: Commit processed ids
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          files=""

          if [ -f processed_owner_ids.json ]; then
            files="$files processed_owner_ids.json"
          fi

          if [ -f processed_threezero_ids.json ]; then
            files="$files processed_threezero_ids.json"
          fi

          if [ -n "$files" ]; then
            git add $files
            if git diff --cached --quiet; then
              echo "No processed id changes to commit"
            else
              git commit -m "Update processed crawler ids"
              git push
            fi
          else
            echo "No processed id files found, skip commit"
          fi
