name: 28hse Signal Crawler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 👇 這裡補上了 beautifulsoup4，讓雲端認得 bs4 工具包
          pip install requests pyyaml beautifulsoup4

      - name: Run crawler with Signal
        env:
          SIGNAL_PHONE: ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_RECIPIENT: ${{ secrets.SIGNAL_RECIPIENT }}
          SIGNAL_URL: ${{ secrets.SIGNAL_URL }}
          SIGNAL_API_KEY: ${{ secrets.SIGNAL_API_KEY }}
        run: python app.py
