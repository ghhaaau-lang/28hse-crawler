name: 28hse Signal Crawler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true  # 授權允許把帳本回寫到 GitHub

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml beautifulsoup4

      - name: Run crawler with Signal
        env:
          SIGNAL_PHONE: ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_RECIPIENT: ${{ secrets.SIGNAL_RECIPIENT }}
          SIGNAL_URL: ${{ secrets.SIGNAL_URL }}
          SIGNAL_API_KEY: ${{ secrets.SIGNAL_API_KEY }}
        run: python app.py
       - name: Run script
        env:
          KV_URL: ${{ secrets.KV_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python app.py
