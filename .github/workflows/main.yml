name: 28hse Signal Crawler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml
          # 安裝 signal-cli
          wget https://github.com/AsamK/signal-cli/releases/download/v0.13.0/signal-cli-0.13.0.tar.gz
          tar xf signal-cli-0.13.0.tar.gz
          sudo mv signal-cli-0.13.0 /opt/signal-cli

      - name: Run crawler with Signal
        env:
          SIGNAL_PHONE: ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_RECIPIENT: ${{ secrets.SIGNAL_RECIPIENT }}
        run: python app.py
