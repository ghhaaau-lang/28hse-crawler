name: 28hse Signal Crawler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Run crawler with Signal
        env:
          SIGNAL_PHONE: ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_RECIPIENT: ${{ secrets.SIGNAL_RECIPIENT }}
          # 👇 完美對接這兩行，爬蟲正式獲得穿透能力！
          SIGNAL_URL: ${{ secrets.SIGNAL_URL }}
          SIGNAL_API_KEY: ${{ secrets.SIGNAL_API_KEY }}
        run: python app.py
