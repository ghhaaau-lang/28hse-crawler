name: threezero Crawler

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run threezero crawler
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python threezero_app.py

      - name: Commit processed threezero ids
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f processed_threezero_ids.json ]; then
            git add processed_threezero_ids.json
            git diff --cached --quiet || git commit -m "Update processed threezero ids"
            git push
          else
            echo "processed_threezero_ids.json not found, skip commit"
          fi
